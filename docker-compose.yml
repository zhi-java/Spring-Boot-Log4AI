# 使用：在项目根目录创建 .env（可复制 .env.example），写入 LLM_API_KEY=sk-...
# 构建镜像前须先有 standalone JAR：mvn -DskipTests package
# 或：$env:LLM_API_KEY='sk-...'; docker compose up --build

services:
  log4ai:
    build: .
    image: log4ai-server:local
    ports:
      - "8080:8080"
    environment:
      LLM_API_KEY: ${LLM_API_KEY:-LOCAL_PLACEHOLDER_SET_LLM_API_KEY}
      LOGGING_FILE_NAME: /data/logs/application.log
    volumes:
      - ./host-logs:/data/logs:ro
      - log4ai-settings:/app/.log4ai

volumes:
  log4ai-settings:
