# 构建并推送到 GHCR：推送符合 v*.*.* 的 Git 标签时自动执行；
# 或在 Actions 里手动「Run workflow」输入版本号。
#
# 首次使用：仓库 Settings → Actions → General → Workflow permissions → Read and write permissions（以便 GITHUB_TOKEN 写 packages）
# 首次推送后：Packages 页面将包设为 Public（若需公开拉取）

name: Publish Docker image (GHCR)

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "镜像版本号（不含 v，如 0.1.0）"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: log4ai-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build standalone JAR
        run: mvn -B -DskipTests package

      - name: Resolve version & image ref
        id: meta
        run: |
          set -e
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER='${{ github.event.inputs.version }}'
          else
            VER="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
