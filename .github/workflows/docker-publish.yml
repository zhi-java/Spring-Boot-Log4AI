# 构建并推送到 GHCR：推送符合 jdk8-* 的 Git 标签时自动执行；
# 或在 Actions 里手动「Run workflow」输入版本号。
#
# 首次使用：
# 1) 仓库 Settings → Actions → General → Workflow permissions → Read and write permissions
# 2) 若仍报 write_package：组织需放行（见 docs/docker-registry-publish.md），或在仓库 Secrets 添加 GHCR_TOKEN（Classic PAT，write:packages）
# 首次推送后：Packages 页面将包设为 Public（若需公开拉取）

name: Publish Docker image (GHCR)

on:
  push:
    tags: ["jdk8-*"]
  workflow_dispatch:
    inputs:
      version:
        description: "镜像版本号（如 jdk8-0.2.0）"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: log4ai-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 与顶层 permissions 一致；部分组织策略下 job 级声明可避免 GITHUB_TOKEN 无 write_package
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Build standalone JAR
        run: mvn -B -DskipTests package

      - name: Resolve version & image ref
        id: meta
        run: |
          set -e
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER='${{ github.event.inputs.version }}'
          else
            VER="${GITHUB_REF_NAME}"
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${OWNER}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      # 优先使用 Secret GHCR_TOKEN（PAT）；未配置时 secrets.GHCR_TOKEN 为空串，|| 回退到 GITHUB_TOKEN。
      # 注意：GitHub 不允许在 if: 里引用 secrets.*，故不能用两个带 if 的登录步骤。
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
